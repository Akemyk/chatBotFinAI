<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>FinAI</title>
</head>
<body>
    <style>
        *{ 
            margin: 0; 
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }
        body{
            background-color: #f0f2f5;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        /*Caixa do chat*/
        .chat-container{
            width: 100%; 
            max-width: 800px; 
            height: 90vh; 
            background-color: #ffffff;
            display: flex;
            flex-direction: column; 
            overflow: hidden; 
        }

        /*Cabeçalho do chat*/
        .chat-header{
            color: rgb(7, 7, 7);
            padding: 15px; 
        }
        .logo-area{
            display: flex; 
            align-items: center; 
            gap: 10px; 

        }
        .logo{
            border-radius: 50%; 
            width: 60px;
            height: 60px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            padding: 0; 
        }
        .logo img{
            width: 100%; 
            height: auto; 
        }
        .titulo{
            font-size: 18px; 
            font-weight: 600;
        }

        /*Área de mensagens, conteúdo principal*/
        .conteudo{
            flex: 1; 
            background-color: #f8f9fa;
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        /*Estilo para as mensagens*/
        .mensagem{
            max-width: 75%; 
            padding: 12px 16px; 
            border-radius: 16px; 
            font-size: 14px; 
            line-height: 1.4; 
        }

        /*Mensagem da IA*/
        .mensagemIA{
            background-color: #e1e4e8; 
            color: #333333; 
            align-self: flex-start; 
            border-top-left-radius: 4px; 
        }

        /*Mensagem do usuário*/
        .mensagem-user{
            background-color: #2e7d32;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /*Barra de digitação*/
        .rodape{
            padding: 15px; 
            background-color: #ffffff;
            border-top: 1px solid #eee; 
            display: flex; 
            gap: 10px; 
        }
        .rodape input{
            flex: 1; 
            padding: 10px 15px; 
            border: 1px solid #cccccc; 
            border-radius: 20px; 
            outline: none; 
        }
        .enviar{
            background-color: #5FD47E;
            color: rgb(0, 0, 0);
            border: none;
            padding: 0 20px; 
            border-radius: 20px; 
            font-weight: bold; 
            cursor: pointer;
        }

    </style>

    <div class="chat-container"> <!---Caixa do chat  -->
        <header class="chat-header"> <!---Cabeçalho do chat  -->
            <div class="logo-area">
            <div class="logo"><img src="FinAI2.png" alt=""></div> 
            <h1 class="titulo">FinAI</h1>
            </div>
        </header>

        <main class="conteudo" id="conteudo"> <!---Área de mensagens, conteúdo principal -->
            <div class="mensagem mensagemIA"> <!---message define o tamnho da fonte, messageIA é msg da IA  -->
                "Olá! Sou a FinAI, sua assistente financeira. Estou aqui para ajudar você a organizar suas finanças!"
            </div>
        </main>

        <footer class="rodape"> <!---Barra de digitação  -->
            <input type="text" id="texto" placeholder="Pergunte algo..." onkeypress="verificarEnter(event)">  <!---Evento para enviar mensagem ao pressionar Enter-->
            <button type="button" class="enviar" onclick="enviarMensagem()">Enviar</button> <!----Quando clicar no botão, vai exucutar uma funçaõ-->
        </footer>
    </div>
    
    <script>
        const menssagens = document.getElementById('conteudo'); 
        const input = document.getElementById('texto'); 
    
        //Construindo o balão de mensagem 
        function criarMsg(texto, tipo){ 
            const div = document.createElement('div'); 

            if(tipo == 'user'){
                div.className = 'mensagem mensagem-user'; 
            } else {
                div.className = 'mensagem mensagemIA'; 
            }

            div.textContent = texto; 
            menssagens.appendChild(div); 
            }

        //Função de envio
        async function enviarMensagem(){
            const texto = input.value; 

            if(texto.trim() === ''){ 
                return;
            }

            criarMsg(texto, 'user'); 
            input.value = ''; 

            try {
                const response = await fetch('http://localhost:5000/chat', { 
                    method: 'POST',
                    headers: {
                    'Content-Type': 'application/json' 
                    },
                   body: JSON.stringify({ mensagem: texto }) 
                });

                const data = await response.json(); 
                
                criarMsg(data.resposta, 'bot'); 
            } catch (error) {
                console.error('Erro ao enviar mensagem:', 'bot'); 
            }
        }
        //Função para enviar mensagem ao pressionar Enter
        function verificarEnter(event){
            if(event.key === 'Enter'){ 
                enviarMensagem(); 
            }
        }

    
    </script>
</body>
</html>
